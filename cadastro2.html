<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro UniHub - Passo 2</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        
        <div class="lado-azul">
            <div class="conteudo-central">
                <img src="images/logo.png" class="logo-img">
                <p>UNIHUB - O seu radar de eventos na universidade.</p>
            </div>
        </div>

        <div class="lado-branco">
            <div class="conteudo-central">
                <h1>BEM-VINDO DE VOLTA!</h1>
                
                <div class="caixa-cadastro">
                    <h2>SEUS DADOS</h2>
                    
                    <input type="text" id="cad-nome" placeholder="NOME">
                    <input type="text" id="cad-nascimento" placeholder="DATA DE NASCIMENTO (DD/MM/AA)">
                    <input type="text" id="cad-curso" placeholder="CURSO">

                    <p id="erro-dados" class="mensagem-erro"></p>

                    <button id="btn-criar-conta" class="btn-azul">CRIAR CONTA</button>
                    
                    <div class="divisor">OU</div>
                    
                    <a href="index.html" style="text-decoration: none; width: 100%;">
                        <button class="btn-azul">VOLTAR PARA LOGIN</button>
                    </a>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
