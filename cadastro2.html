<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro UniHub - Passo 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <div class="lado-azul">
            <div class="conteudo-central">
                <img src="logo.png" class="logo-img">
                <p>UNIHUB - O seu radar de eventos na universidade.</p>
            </div>
        </div>

        <div class="lado-branco">
            <div class="conteudo-central">
                <h1>BEM-VINDO DE VOLTA!</h1>
                
                <div class="caixa-cadastro">
                    <h2>SEUS DADOS</h2>
                    
                    <input type="text" placeholder="NOME">
                    <input type="text" placeholder="DATA DE NASCIMENTO (DD/MM/AA)">
                    <input type="text" placeholder="CURSO">
                    
                    <button class="btn-azul">CRIAR CONTA</button>
                    
                    <div class="divisor">OU</div>
                    
                    <a href="Login.html">
                        <button class="btn-azul">VOLTAR PARA LOGIN</button>
                    </a>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
