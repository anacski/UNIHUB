<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UNIHUB - Editar Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style-editar-perfil.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <a href="timeline.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <img src="images/logo.png" class="nav-logo" alt="Logo">
                    <span class="nav-title">UNIHUB</span>
                </a>
            </div>
            <div class="nav-right">
                <a href="timeline.html">Início</a>
                <a href="formulario.html">Criar Evento</a>
                <a href="perfil.html" class="active">Perfil</a>
            </div>
        </div>
    </nav>

    <main class="profile-container">
        <div class="edit-container">
            <h3>Visualização em Tempo Real</h3>
            
            <div class="preview-box edit-header-preview">
                <img src="images/avatar-jorge.png" class="preview-avatar edit-avatar-preview" alt="Avatar Preview">
            </div>

            <div class="upload-buttons">
                <label class="btn-upload">
                    <i class="fa-solid fa-image"></i> Mudar Capa
                    <input type="file" id="file-capa" accept="image/*" style="display: none;">
                </label>
                <label class="btn-upload">
                    <i class="fa-solid fa-user-gear"></i> Mudar Foto
                    <input type="file" id="file-avatar" accept="image/*" style="display: none;">
                </label>
            </div>

            <form id="form-editar-perfil">
                <div class="form-group">
                    <label for="edit-nome">Nome Completo</label>
                    <input type="text" id="edit-nome" required>
                </div>
                <div class="form-group">
                    <label for="edit-curso">Centro e Curso</label>
                    <input type="text" id="edit-curso" placeholder="Ex: CCH - Pedagogia" required>
                </div>
                <div class="form-group">
                    <label for="edit-idade">Idade</label>
                    <input type="text" id="edit-idade" inputmode="numeric" pattern="[0-9]*" maxlength="3" placeholder="Ex: 21" required>
                </div>
                <div class="form-group">
                    <label for="edit-bio">Biografia</label>
                    <textarea id="edit-bio" maxlength="160"></textarea>
                </div>

                <div class="action-container">
                    <a href="perfil.html" class="btn-cancelar">Cancelar</a>
                    <button type="submit" id="btn-salvar-perfil" class="btn-salvar">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
