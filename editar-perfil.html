<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UNIHUB - Editar Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style-editar-perfil.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <a href="timeline.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <img src="images/logo.png" class="nav-logo" alt="Logo">
                    <span class="nav-title">UNIHUB</span>
                </a>
            </div>
            <input type="text" id="search-bar" class="search-bar" placeholder="Buscar futsal, vôlei...">
            <div class="nav-right">
                <a href="chat.html" class="nav-item-link" title="Mensagens">
                    <div class="notif-icon"><i class="fa-regular fa-comment-dots"></i><span class="badge">3</span></div>
                </a>
                <a href="timeline.html">Início</a>
                <a href="formulario.html">Criar Evento</a>
                <a href="perfil.html">Perfil</a>
                <a href="#" id="btn-sair" class="logout-link" title="Sair" style="color: #ff3333; font-size: 1.2rem; margin-left: 15px; display: flex; align-items: center; background: none; border: none; cursor: pointer;">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="edit-container">
        <div class="edit-card">
            <div class="edit-header">
                <button type="button" class="btn-change-cover" title="Alterar capa" style="background: none; border: none; color: #fff; cursor: pointer; font-size: 1.2rem; padding: 10px;">
                    <i class="fa-solid fa-camera"></i>
                </button>
            </div>
            
            <div class="avatar-section">
                <div class="avatar-wrapper">
                    <img src="images/avatar-jorge.png" class="avatar-img" alt="Avatar">
                    <button type="button" class="avatar-camera" title="Alterar foto de perfil" style="border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                        <i class="fa-solid fa-camera" style="font-size: 1rem;"></i>
                    </button>
                </div>
            </div>

            <form class="edit-form" id="edit-profile-form">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" value="Jorge Filho" required>
                </div>

                <div class="form-group">
                    <label>Campus</label>
                    <div class="custom-select">
                        <select required>
                            <option>CCH</option>
                            <option>CCET</option>
                            <option>CLA</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Curso</label>
                    <div class="custom-select">
                        <select required>
                            <option>Pedagogia</option>
                            <option>Sistemas de Informação</option>
                            <option>Teatro</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Biografia</label>
                    <textarea placeholder="Digite aqui...">Gosto de esportes calmos</textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="window.location.href='perfil.html'" style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <i class="fa-regular fa-circle-xmark"></i> Cancelar
                    </button>
                    <button type="submit" class="btn-save">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
