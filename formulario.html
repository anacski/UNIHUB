<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UNIHUB - Criar Evento</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style-formulario.css"> 
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <a href="timeline.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <img src="images/logo.png" class="nav-logo" alt="Logo">
                    <span class="nav-title">UNIHUB</span>
                </a>
            </div>
            <input type="text" id="search-bar" class="search-bar" placeholder="Buscar futsal, vôlei...">
            <div class="nav-right">
                <a href="chat.html" class="nav-item-link" title="Mensagens">
                    <div class="notif-icon"><i class="fa-regular fa-comment-dots"></i><span class="badge">3</span></div>
                </a>
                <a href="timeline.html">Início</a>
                <a href="formulario.html" class="active">Criar Evento</a>
                <a href="perfil.html">Perfil</a>
                <a href="#" id="btn-sair" class="logout-link" title="Sair" style="color: #ff3333; font-size: 1.2rem; margin-left: 15px; display: flex; align-items: center; background: none; border: none; cursor: pointer;">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="form-container">
        <div class="form-card">
            <h2>Criar Publicação</h2>
            <form id="event-form">
                <div class="form-group">
                    <label>Nome do Evento:</label>
                    <input type="text" id="event-name" placeholder="Esporte/Atividade" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Local:</label>
                        <div class="input-icon">
                            <input type="text" id="event-location" placeholder="Auditório CLA" required>
                            <span class="field-icon" style="background: none; border: none;"><i class="fa-solid fa-location-dot"></i></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Data e Hora:</label>
                        <div class="input-icon">
                            <input type="datetime-local" id="event-date" required style="padding-right: 10px;">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Descrição:</label>
                    <textarea id="event-desc" placeholder="Digite aqui..." required></textarea>
                </div>

                <div class="form-actions" style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn-cancel" onclick="window.location.href='timeline.html'" style="padding: 10px 20px; background-color: #e4e6eb; color: #050505; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">
                        Cancelar
                    </button>
                    <button type="submit" class="btn-submit" style="padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">
                        Publicar no Mural
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
