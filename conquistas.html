<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UNIHUB - Conquistas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style-perfil.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <a href="timeline.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <img src="images/logo.png" class="nav-logo" alt="Logo">
                    <span class="nav-title">UNIHUB</span>
                </a>
            </div>
            <input type="text" id="search-bar" class="search-bar" placeholder="Buscar futsal, vôlei...">
            <div class="nav-right">
                <a href="chat.html" class="nav-item-link" title="Mensagens">
                    <div class="notif-icon"><i class="fa-regular fa-comment-dots"></i><span class="badge">3</span></div>
                </a>
                <a href="timeline.html">Início</a>
                <a href="formulario.html">Criar Evento</a>
                <a href="perfil.html" class="active">Perfil</a>
                <a href="#" id="btn-sair" class="logout-link" title="Sair" style="color: #ff3333; font-size: 1.2rem; margin-left: 15px; display: flex; align-items: center; background: none; border: none; cursor: pointer;">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="profile-container">
        <section class="profile-card">
            <div class="profile-header">
                <a href="editar-perfil.html">
                    <button class="btn-edit-profile"><i class="fa-solid fa-pen"></i> Editar Perfil</button>
                </a>
            </div>
            <div class="profile-body">
                <div class="avatar-wrapper">
                    <img src="images/avatar-jorge.png" class="avatar-large" alt="Jorge Filho">
                </div>
                <h2>Jorge Filho</h2>
                <p class="course">CCH - Pedagogia</p>
                <p class="age">21 Anos</p>
                <p class="bio">Gosto de esportes calmos</p>
                
                <div class="side-badges">
                    <span class="badge-icon" title="Campeão">🏆</span>
                    <span class="badge-icon" title="Primeiro Lugar">🥇</span>
                </div>
            </div>
        </section>

        <section class="tabs-container">
            <a href="perfil.html" class="tab" style="text-decoration: none;"><i class="fa-solid fa-bookmark"></i> Eventos Salvos</a>
            <a href="atvdantigas.html" class="tab" style="text-decoration: none;"><i class="fa-solid fa-clock-rotate-left"></i> Atividades Antigas</a>
            <div class="tab active"><i class="fa-solid fa-trophy"></i> Conquistas</div>
        </section>

        <section class="events-list">
            <div class="event-card">
                <div class="event-left" style="display: flex; align-items: center; justify-content: center; min-width: 70px;">
                    <span style="font-size: 2.2rem;">🏆</span>
                </div>
                <div class="event-middle">
                    <h3>Primeiro Lugar no Intercolegial</h3>
                    <p class="desc-label">Conquista:</p>
                    <p class="desc-text">Vencedor da competição regional de basquete universitário.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
