<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login UniHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        
        <div class="lado-azul">
            <div class="conteudo-central">
                <img src="images/logo.png" class="logo-img">
                <p>UNIHUB - O seu radar de eventos na universidade.</p>
            </div>
        </div>

        <div class="lado-branco">
            <div class="conteudo-central">
                <h1>BEM-VINDO DE VOLTA!</h1>
                
                <div class="caixa-laranja">
                    <h2>FAÇA O LOGIN</h2>
                    
                    <input type="text" id="email" placeholder="EMAIL@EDU.UNIRIO.BR">
                    <input type="password" id="senha" placeholder="SENHA">
                    <p id="erro-login" class="mensagem-erro"></p> 

                    <button id="btn-entrar" class="btn-azul">ENTRAR</button>
                    
                    <p id="btn-esqueceu-senha" class="esqueceu" style="cursor: pointer;">ESQUECEU A SENHA?</p>
                    
                    <div class="divisor">OU</div>
                    
                    <button id="btn-crie-conta" class="btn-azul">CRIE SUA CONTA</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
