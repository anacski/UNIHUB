<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UNIHUB - Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style-timeline.css">
    <link rel="stylesheet" href="css/style-chat.css"> 
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <a href="timeline.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <img src="images/logo.png" class="nav-logo" alt="Logo">
                    <span class="nav-title">UNIHUB</span>
                </a>
            </div>
            <input type="text" id="search-bar" class="search-bar" placeholder="Buscar futsal, vôlei...">
            <div class="nav-right">
                <a href="chat.html" class="nav-item-link active" title="Mensagens">
                    <div class="notif-icon"><i class="fa-solid fa-comment-dots"></i><span class="badge">3</span></div>
                </a>
                <a href="timeline.html">Início</a>
                <a href="formulario.html">Criar Evento</a>
                <a href="perfil.html" id="nav-perfil-link">Perfil</a>
                <a href="#" id="btn-sair" class="logout-link" title="Sair" style="color: #ff3333; font-size: 1.2rem; margin-left: 15px; display: flex; align-items: center; background: none; border: none; cursor: pointer;">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="chat-container">
        <aside class="sidebar-chats">
            <div class="chat-list">
                <div class="chat-item" style="cursor: pointer;" data-grupo="Xadrezin">
                    <img src="images/icon-xadrez.png" class="chat-avatar" alt="Xadrezin">
                    <div class="chat-info">
                        <h4>Xadrezin</h4>
                        <p>sábado não tem...</p>
                    </div>
                    <span class="chat-time">15:17</span>
                </div>

                <div class="chat-item active" style="cursor: pointer;" data-grupo="Basquete">
                    <img src="images/icon-basquete.png" class="chat-avatar" alt="Basquete">
                    <div class="chat-info">
                        <h4>Basquete</h4>
                        <p><i class="fa-solid fa-paperclip" style="font-size: 0.85rem;"></i> Vídeo</p>
                    </div>
                    <span class="chat-time">12:03</span>
                </div>

                <div class="chat-item" style="cursor: pointer;" data-grupo="Vôlei">
                    <img src="images/icon-volei.png" class="chat-avatar" alt="Vôlei">
                    <div class="chat-info">
                        <h4>Vôlei sexta-feira 10/04</h4>
                        <p>boaaa!!!</p>
                    </div>
                    <span class="chat-time">10:33</span>
                </div>

                <div class="chat-item" style="cursor: pointer;" data-grupo="Ping pong">
                    <img src="images/icon-pingpong.png" class="chat-avatar" alt="Ping pong">
                    <div class="chat-info">
                        <h4>Ping pong do CALOVE</h4>
                        <p>KKKKKKKKK</p>
                    </div>
                    <span class="chat-time">21:40</span>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="btn-voltar" onclick="window.location.href='timeline.html'" style="display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;">
                    <i class="fa-solid fa-arrow-left"></i> Voltar
                </button>
            </div>
        </aside>

        <section class="main-chat">
            <header class="chat-header">
                <div class="chat-header-info" id="chat-header-atual">
                    <img src="images/icon-basquete.png" class="chat-avatar" id="header-avatar" alt="Basquete">
                    <h2 id="header-nome">Basquete</h2>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages-container">
                <div class="message right">
                    <div class="bubble blue">Vai ter jogo sábado?</div>
                </div>

                <div class="timestamp">12h</div>

                <div class="message left">
                    <div class="bubble yellow">15h no aterro</div>
                </div>

                <div class="message right">
                    <div class="bubble blue thumb">👍</div>
                </div>

                <div class="timestamp">11h</div>

                <div class="message left">
                    <div class="bubble yellow">
                        <img src="images/jogo-basquete.jpeg" class="media-preview" alt="Print de jogo de basquete normal">
                    </div>
                </div>
            </div>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="chat-input-field" placeholder="Digite uma mensagem...">
            
                    <button class="btn-attach" id="btn-clip-attach" style="background: none; border: none; cursor: pointer; display: flex; align-items: center;">
                        <i class="fa-solid fa-paperclip"></i>
                    </button>
                    <input type="file" id="chat-hidden-file" style="display: none;">
                </div>
                <button class="btn-send" id="btn-send-message" style="border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </footer>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
